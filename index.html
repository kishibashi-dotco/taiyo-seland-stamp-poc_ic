.bottom-nav { display: flex; border-top: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; }

.feedback { text-align: center; padding: 32px; border-radius: 16px; margin: 24px; }

.feedback.end { background: #eff6ff; border: 2px solid #60a5fa; }

.feedback .name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.feedback .action { font-size: 20px; font-weight: 700; }
.feedback .action.start-text { color: #15803d; }
.feedback .action.end-text { color: #1d4ed8; }
.feedback .duration { font-size: 18px; color: #2563eb; margin-top: 8px; }

.ic-reader-icon .ic-svg { font-size: 80px; z-index: 1; }
.ic-reader-icon .pulse-ring { position: absolute; width: 160px; height: 160px; border-radius: 50%; border: 3px solid #0ea5e9; opacity: 0; animation: icPulse 2s ease-out infinite; }
.ic-reader-icon .pulse-ring:nth-child(2) { animation-delay: 0.6s; }
.ic-reader-icon .pulse-ring:nth-child(3) { animation-delay: 1.2s; }
@keyframes icPulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }
.ic-reader-label { margin-top: 14px; font-size: 18px; color: #475569; font-weight: 600; }
.ic-reader-sub { margin-top: 6px; font-size: 14px; color: #94a3b8; }
.ic-reader-status { margin-top: 8px; font-size: 12px; padding: 4px 12px; border-radius: 999px; }
.ic-reader-status.ready { background: #dcfce7; color: #15803d; }
.ic-reader-status.reading { background: #fef9c3; color: #854d0e; }
.ic-reader-status.error { background: #fef2f2; color: #b91c1c; }
.ic-reader-device { margin-top: 12px; font-size: 11px; color: #94a3b8; background: #f8fafc; padding: 4px 12px; border-radius: 6px; }

.process-select { padding: 16px 24px; flex: 1; display: flex; flex-direction: column; }
.process-select .greeting { text-align: center; margin-bottom: 20px; }
.process-select .greeting .name { font-size: 22px; font-weight: 700; color: #1e293b; }
.process-select .greeting .sub { font-size: 14px; color: #64748b; margin-top: 4px; }
.process-select .label { font-size: 13px; color: #64748b; margin-bottom: 12px; font-weight: 600; }
.process-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 320px; overflow-y: auto; padding-right: 4px; }

.process-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
.process-btn { padding: 18px 12px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; }
.process-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
.process-btn:active { background: #e2e8f0; transform: scale(0.97); }

.cancel-link button { background: none; border: none; color: #94a3b8; font-size: 13px; cursor: pointer; }
.cancel-link button:hover { color: #64748b; }

.sim-label { font-size: 11px; color: #0369a1; text-align: center; margin-bottom: 8px; font-weight: 600; }

.sim-btn { padding: 8px 14px; background: #fff; border: 1px solid #7dd3fc; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 6px; }
.sim-btn:hover { background: #f0f9ff; }
.sim-btn:active { background: #e0f2fe; transform: scale(0.97); }
.sim-btn .ic-mini { width: 16px; height: 16px; background: #0ea5e9; border-radius: 3px; display: inline-block; }

.recent-label { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }

.recent-item .time { font-family: monospace; color: #64748b; }

.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }

.form-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
select, input[type="date"], input[type="time"], input[type="text"] { border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 12px; font-size: 13px; background: #fff; }
table { width: 100%; font-size: 13px; border-collapse: collapse; }
thead tr { background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
th { text-align: left; padding: 8px; font-weight: 600; color: #475569; }
td { padding: 8px; border-bottom: 1px solid #f1f5f9; }

.mono { font-family: monospace; }

.stamp-landscape .recent-side { display: flex; flex-direction: column; }

  .stamp-landscape .recent-side { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }

  .ic-reader-icon { width: 180px; height: 180px; }

@media (min-width: 1024px) {

  .ic-reader-icon { width: 220px; height: 220px; }
  .process-grid { grid-template-columns: repeat(4, 1fr); }
}

// ==================== Utility ====================
const fmt = (iso) => { if (!iso) return "\u2014"; const d = new Date(iso); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
const dur = (s, e) => { if (!s||!e) return "\u2014"; const d = new Date(e)-new Date(s); return `${Math.floor(d/3600000)}h${String(Math.floor((d%3600000)/60000)).padStart(2,"0")}m`; };
const durMs = (s, e) => { if (!s||!e) return 0; return new Date(e) - new Date(s); };
const msToHM = (ms) => { const h = Math.floor(ms/3600000); const m = Math.floor((ms%3600000)/60000); return `${h}h${String(m).padStart(2,"0")}m`; };
const prName = (id) => id === "day_end" ? "工場業務終了" : (MOCK_PROCESSES.find(p => p.process_id === id)?.process_name || id);
const calcWorkTime = (stamps, empId, dateStr) => {
  const dayStamps = stamps.filter(s => s.employee_id === empId && s.stamp_time.startsWith(dateStr)).sort((a,b) => new Date(a.stamp_time) - new Date(b.stamp_time));
  const firstStart = dayStamps.find(s => s.stamp_type === "start");
  const dayEnd = dayStamps.find(s => s.stamp_type === "day_end");
  if (!firstStart || !dayEnd) return null;
  const totalMs = durMs(firstStart.stamp_time, dayEnd.stamp_time);
  const breakMs = 3600000;
  const workMs = Math.max(0, totalMs - breakMs);
  return { totalMs, workMs, breakMs, isShort: workMs < 7.5 * 3600000, formatted: msToHM(workMs), totalFormatted: msToHM(totalMs) };
};

// ==================== IC Card Reader Hook (Keyboard Wedge) ====================
// クロノス DRAGON はUSB HIDキーボードウェッジモードで動作。
// カードタッチ → カードIDが高速キーストロークで送信 → Enterで確定。
// 人間のタイピングとの区別: 80ms以内の連続入力をカード読取と判定。
const useICCardReader = (onDetect, enabled) => {
  const [readerStatus, setReaderStatus] = useState("ready");
  const bufferRef = useRef("");
  const timerRef = useRef(null);
  const onDetectRef = useRef(onDetect);
  const enabledRef = useRef(enabled);
  const cooldownRef = useRef(false);

  useEffect(() => { onDetectRef.current = onDetect; }, [onDetect]);
  useEffect(() => { enabledRef.current = enabled; }, [enabled]);

  useEffect(() => {
    if (!enabled) return;
    const KEYSTROKE_THRESHOLD = 80;

    const handleKeyDown = (e) => {
      if (!enabledRef.current || cooldownRef.current) return;
      // フォーム入力中はスキップ
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;

      if (e.key === "Enter") {
        e.preventDefault();
        const cardId = bufferRef.current.trim();
        if (cardId.length >= 3) {
          setReaderStatus("reading");
          cooldownRef.current = true;
          if (onDetectRef.current) onDetectRef.current(cardId);
          setTimeout(() => { cooldownRef.current = false; setReaderStatus("ready"); }, 2000);
        }
        bufferRef.current = "";
        if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
        return;
      }
      if (e.key.length === 1) {
        e.preventDefault();
        bufferRef.current += e.key;
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => { bufferRef.current = ""; timerRef.current = null; }, KEYSTROKE_THRESHOLD);
      }
    };

    document.addEventListener("keydown", handleKeyDown);
    return () => { document.removeEventListener("keydown", handleKeyDown); if (timerRef.current) clearTimeout(timerRef.current); };
  }, [enabled]);

  return { readerStatus };
};

  const [currentFactory, setCurrentFactory] = useState(() => loadFactory());
  useEffect(() => { saveStamps(stamps); }, [stamps]);
  useEffect(() => { saveFactory(currentFactory); }, [currentFactory]);

  const tabs = [
    {id:"stamp",label:"打刻",icon:"\uD83D\uDCB3"},
    {id:"history",label:"履歴",icon:"\uD83D\uDCCB"},
    {id:"manager",label:"管理者",icon:"\uD83D\uDC64"},
    {id:"icreg",label:"IC登録",icon:"\uD83D\uDD11"},
    {id:"settings",label:"設定",icon:"\u2699\uFE0F"}
  ];

  const screen = () => {
    if (editing && tab==="history") return React.createElement(EditScreen,{stamp:editing,stamps,setStamps,onBack:()=>setEditing(null),processes:MOCK_PROCESSES});
    switch(tab){
      case "stamp": return React.createElement(StampScreen,{stamps,setStamps,employees:MOCK_EMPLOYEES,processes:MOCK_PROCESSES,currentFactory,setCurrentFactory});
      case "history": return React.createElement(HistoryScreen,{stamps,employees:MOCK_EMPLOYEES,processes:MOCK_PROCESSES,onEdit:s=>setEditing(s)});
      case "manager": return React.createElement(ManagerScreen,{stamps,setStamps,employees:MOCK_EMPLOYEES,processes:MOCK_PROCESSES});
      case "icreg": return React.createElement(ICRegScreen,{employees:MOCK_EMPLOYEES});
      case "settings": return React.createElement(SettingsScreen,{processes:MOCK_PROCESSES,employees:MOCK_EMPLOYEES,currentFactory,setCurrentFactory,stamps,setStamps});
    }
  };

  return React.createElement("div",{className:"app-shell"},
    screen(),
    React.createElement("nav",{className:"bottom-nav"},
      tabs.map(t=>React.createElement("button",{key:t.id,className:`nav-btn ${tab===t.id?"active":""}`,onClick:()=>{setTab(t.id);setEditing(null);}},
        React.createElement("span",{className:"icon"},t.icon),t.label)))
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
