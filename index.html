.feedback .action { font-size: 20px; font-weight: 700; }
.feedback .action.start-text { color: #15803d; }
.feedback .action.end-text { color: #1d4ed8; }
.feedback .duration { font-size: 18px; color: #2563eb; margin-top: 8px; }

.process-btn { padding: 18px 12px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; }
.process-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
.process-btn:active { background: #e2e8f0; transform: scale(0.97); }
.process-btn.active-process { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
/* Action buttons */
.action-area { display: flex; gap: 12px; margin-top: 16px; padding: 0 24px 24px; }
.action-btn { flex: 1; padding: 18px; border-radius: 12px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s; }

.process-grid::-webkit-scrollbar { width: 4px; }
.process-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
</head>

const generateMockStamps = () => {
  const stamps = [];
  const pairs = [
    { emp: "emp_001", pr: "pr_101", start: "08:02", end: "10:55" },
    { emp: "emp_001", pr: "pr_105", start: "11:10", end: null },

    { emp: "emp_004", pr: "pr_103", start: "09:10", end: "12:20", modified: true, modify_reason: "時刻誤り" },
  ];
  pairs.forEach((p, i) => {
    const emp = MOCK_EMPLOYEES.find(e => e.employee_id === p.emp);
    stamps.push({
      stamp_id: `stm_${String(i * 2 + 1).padStart(3, "0")}`,

      process_id: p.pr, stamp_type: "start", stamp_time: `${today}T${p.start}:00`,
      is_modified: p.modified || false, modify_reason: p.modify_reason || "",
      modified_by: "", modified_at: "", confirmed: false, confirmed_by: "", confirmed_at: "",
    });
    if (p.end) {
      stamps.push({
        stamp_id: `stm_${String(i * 2 + 2).padStart(3, "0")}`,
        idm: emp.idm, employee_id: p.emp, employee_name: emp.employee_name,

    }
  });
  return stamps;

const dur = (s, e) => { if (!s||!e) return "\u2014"; const d = new Date(e)-new Date(s); return `${Math.floor(d/3600000)}h${String(Math.floor((d%3600000)/60000)).padStart(2,"0")}m`; };
const prName = (id) => MOCK_PROCESSES.find(p => p.process_id === id)?.process_name || id;

// ==================== Clock ====================
const Clock = () => {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  return React.createElement("span", null, `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`);
};

            React.createElement("td",{className:"mono"},i+1),
            React.createElement("td",null,p.process_name),
            React.createElement("td",{style:{fontSize:11,color:"#94a3b8"}},currentFactory.factory_name)))))),
      React.createElement("div",{className:"settings-section"},
        React.createElement("h3",null,"従業員マスタ"),

      React.createElement("div",{className:"sys-info"},

};

// ==================== Main App ====================
const App = () => {
  const [stamps, setStamps] = useState(generateMockStamps);
  const [tab, setTab] = useState("stamp");
  const [editing, setEditing] = useState(null);
  const [currentFactory, setCurrentFactory] = useState(FACTORIES[0]);

  const tabs = [{id:"stamp",label:"打刻",icon:"\uD83D\uDCF3"},{id:"history",label:"履歴",icon:"\uD83D\uDCCB"},{id:"manager",label:"管理者",icon:"\uD83D\uDC64"},{id:"settings",label:"設定",icon:"\u2699\uFE0F"}];

  const screen = () => {
    if (editing && tab==="history") return React.createElement(EditScreen,{stamp:editing,stamps,setStamps,onBack:()=>setEditing(null),processes:MOCK_PROCESSES});
    switch(tab){
      case "stamp": return React.createElement(StampScreen,{stamps,setStamps,employees:MOCK_EMPLOYEES,processes:MOCK_PROCESSES,currentFactory,setCurrentFactory});
      case "history": return React.createElement(HistoryScreen,{stamps,employees:MOCK_EMPLOYEES,processes:MOCK_PROCESSES,onEdit:s=>setEditing(s)});
      case "manager": return React.createElement(ManagerScreen,{stamps,setStamps,employees:MOCK_EMPLOYEES,processes:MOCK_PROCESSES});
      case "settings": return React.createElement(SettingsScreen,{processes:MOCK_PROCESSES,employees:MOCK_EMPLOYEES,currentFactory,setCurrentFactory});
    }
  };

  return React.createElement("div",{className:"app-shell"},
    screen(),
    React.createElement("nav",{className:"bottom-nav"},
      tabs.map(t=>React.createElement("button",{key:t.id,className:`nav-btn ${tab===t.id?"active":""}`,onClick:()=>{setTab(t.id);setEditing(null);}},
        React.createElement("span",{className:"icon"},t.icon),t.label)))
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
